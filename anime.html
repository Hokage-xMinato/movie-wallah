<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animesfan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: #121212;
            --primary-color: #e50914;
            --primary-hover: #b80710;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--primary-color);
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
        }

        .nav-icon {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .nav-icon:hover {
            color: var(--primary-color);
        }

        /* Views */
        main {
            padding: 2rem 5%;
            min-height: calc(100vh - 70px);
        }

        .view {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h1, h2 {
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        /* Anime Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.5rem;
        }

        .anime-card {
            background: var(--surface-color);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.2);
        }

        .anime-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .anime-info {
            padding: 1rem;
        }

        .anime-title {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anime-ep {
            font-size: 0.8rem;
            color: var(--primary-color);
            margin-top: 0.5rem;
        }

        /* Search Bar */
        .search-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 25px;
            border: 1px solid #333;
            background: var(--surface-color);
            color: white;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        /* Details View */
        .details-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .details-container {
                flex-direction: row;
            }
        }

        .details-cover {
            width: 100%;
            max-width: 300px;
            border-radius: 10px;
            object-fit: cover;
        }

        .details-content p {
            color: var(--text-muted);
            line-height: 1.6;
            margin: 1rem 0;
            font-size: 0.95rem;
        }

        /* Watch View */
        .video-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            max-width: 1000px;
            margin: 1.5rem auto;
            background: var(--surface-color);
            padding: 1rem;
            border-radius: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        select {
            padding: 0.6rem;
            border-radius: 5px;
            background: #222;
            color: white;
            border: 1px solid #444;
            outline: none;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 3rem;
        }
        
        /* Loader */
        .loader {
            display: none;
            text-align: center;
            margin: 2rem 0;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="app.navigate('home')">animes<span>fan</span></div>
        <div class="nav-icons">
            <span class="nav-icon" onclick="app.navigate('home')">Home</span>
            <span class="nav-icon" onclick="app.navigate('search')">Search</span>
        </div>
    </header>

    <main>
        <div id="home" class="view active">
            <h2>Continue Watching</h2>
            <div id="continue-watching-grid" class="anime-grid"></div>
            <div id="empty-home" class="empty-state" style="display: none;">
                No watch history yet. Go search for some anime!
            </div>
        </div>

        <div id="search" class="view">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search for an anime..." onkeypress="if(event.key === 'Enter') app.searchAnime()">
                <button class="btn" onclick="app.searchAnime()">Search</button>
            </div>
            <div id="loader" class="loader">Loading...</div>
            <div id="search-results" class="anime-grid"></div>
        </div>

        <div id="details" class="view">
            <div class="details-container">
                <img id="detail-img" class="details-cover" src="" alt="Cover">
                <div class="details-content">
                    <h1 id="detail-title"></h1>
                    <p id="detail-desc"></p>
                    <p><strong>Total Episodes:</strong> <span id="detail-eps"></span></p>
                    <button class="btn" style="margin-top: 1rem;" onclick="app.startWatching()">Watch Now</button>
                </div>
            </div>
        </div>

        <div id="watch" class="view">
            <h2 id="watch-title" style="text-align: center; margin-bottom: 1rem;"></h2>
            
            <div class="video-container">
                <iframe id="video-player" allowfullscreen></iframe>
            </div>

            <div class="controls-bar">
                <div class="control-group">
                    <button class="btn" onclick="app.changeEpisode(-1)">Prev</button>
                    <select id="episode-selector" onchange="app.jumpEpisode()"></select>
                    <button class="btn" onclick="app.changeEpisode(1)">Next</button>
                </div>
                
                <div class="control-group">
                    <select id="format-selector" onchange="app.changeFormat()">
                        <option value="sub">Sub</option>
                        <option value="dub">Dub</option>
                    </select>
                </div>
            </div>
        </div>
    </main>

    <script>
        const app = {
            currentAnime: null,
            currentEpisode: 1,
            currentFormat: 'sub',
            watchHistory: JSON.parse(localStorage.getItem('animesfan_history')) || {},

            // Navigation
            navigate: function(viewId) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                if(viewId === 'home') this.renderHome();
                window.scrollTo(0, 0);
            },

            // Home Render
            renderHome: function() {
                const grid = document.getElementById('continue-watching-grid');
                const empty = document.getElementById('empty-home');
                grid.innerHTML = '';
                
                const historyIds = Object.keys(this.watchHistory);
                if (historyIds.length === 0) {
                    empty.style.display = 'block';
                    return;
                }
                
                empty.style.display = 'none';
                
                historyIds.reverse().forEach(id => {
                    const anime = this.watchHistory[id];
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.onclick = () => this.resumeAnime(anime);
                    card.innerHTML = `
                        <img src="${anime.image}" alt="${anime.title}">
                        <div class="anime-info">
                            <div class="anime-title">${anime.title}</div>
                            <div class="anime-ep">Ep ${anime.episode} | ${anime.format.toUpperCase()}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            // Search AniList API
            searchAnime: async function() {
                const query = document.getElementById('search-input').value;
                if(!query) return;

                const loader = document.getElementById('loader');
                const grid = document.getElementById('search-results');
                
                grid.innerHTML = '';
                loader.style.display = 'block';

                const graphqlQuery = `
                query ($search: String) {
                    Page(page: 1, perPage: 20) {
                        media(search: $search, type: ANIME, sort: POPULARITY_DESC) {
                            id
                            title { romaji english }
                            coverImage { large }
                            description(asHtml: false)
                            episodes
                        }
                    }
                }`;

                try {
                    const response = await fetch('https://graphql.anilist.co', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ query: graphqlQuery, variables: { search: query } })
                    });
                    
                    const data = await response.json();
                    loader.style.display = 'none';
                    this.renderSearchResults(data.data.Page.media);
                } catch (error) {
                    loader.style.display = 'none';
                    grid.innerHTML = '<p class="empty-state">Error fetching data. Please try again.</p>';
                }
            },

            renderSearchResults: function(results) {
                const grid = document.getElementById('search-results');
                results.forEach(anime => {
                    const title = anime.title.english || anime.title.romaji;
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.onclick = () => this.showDetails(anime);
                    card.innerHTML = `
                        <img src="${anime.coverImage.large}" alt="${title}">
                        <div class="anime-info">
                            <div class="anime-title">${title}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            // Details View
            showDetails: function(anime) {
                this.currentAnime = anime;
                const title = anime.title.english || anime.title.romaji;
                
                document.getElementById('detail-img').src = anime.coverImage.large;
                document.getElementById('detail-title').innerText = title;
                
                // Clean HTML tags from description
                let desc = anime.description || 'No description available.';
                document.getElementById('detail-desc').innerHTML = desc;
                
                document.getElementById('detail-eps').innerText = anime.episodes || 'Ongoing';
                
                this.navigate('details');
            },

            // Watch Logic
            startWatching: function() {
                const history = this.watchHistory[this.currentAnime.id];
                this.currentEpisode = history ? history.episode : 1;
                this.currentFormat = history ? history.format : 'sub';
                
                document.getElementById('format-selector').value = this.currentFormat;
                this.setupWatchEnvironment();
                this.navigate('watch');
            },

            resumeAnime: function(historyData) {
                this.currentAnime = historyData.fullData;
                this.currentEpisode = historyData.episode;
                this.currentFormat = historyData.format;
                
                document.getElementById('format-selector').value = this.currentFormat;
                this.setupWatchEnvironment();
                this.navigate('watch');
            },

            setupWatchEnvironment: function() {
                const title = this.currentAnime.title.english || this.currentAnime.title.romaji;
                document.getElementById('watch-title').innerText = `${title} - Episode ${this.currentEpisode}`;
                
                // Setup Episode Dropdown
                const selector = document.getElementById('episode-selector');
                selector.innerHTML = '';
                const totalEps = this.currentAnime.episodes || 1000; // Fallback for ongoing
                
                for(let i = 1; i <= totalEps; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.innerText = `Episode ${i}`;
                    if(i === this.currentEpisode) option.selected = true;
                    selector.appendChild(option);
                    
                    // Break early if ongoing and we've generated a bunch past the current episode
                    if (!this.currentAnime.episodes && i > this.currentEpisode + 50) break;
                }

                this.loadIframe();
            },

            loadIframe: function() {
                const iframe = document.getElementById('video-player');
                const url = `https://vidnest.fun/animepahe/${this.currentAnime.id}/${this.currentEpisode}/${this.currentFormat}`;
                iframe.src = url;
                
                const title = this.currentAnime.title.english || this.currentAnime.title.romaji;
                document.getElementById('watch-title').innerText = `${title} - Episode ${this.currentEpisode}`;
                document.getElementById('episode-selector').value = this.currentEpisode;

                this.saveProgress();
            },

            changeEpisode: function(step) {
                const newEp = this.currentEpisode + step;
                if(newEp > 0 && (newEp <= (this.currentAnime.episodes || Infinity))) {
                    this.currentEpisode = newEp;
                    this.setupWatchEnvironment(); 
                }
            },

            jumpEpisode: function() {
                const selector = document.getElementById('episode-selector');
                this.currentEpisode = parseInt(selector.value);
                this.loadIframe();
            },

            changeFormat: function() {
                const selector = document.getElementById('format-selector');
                this.currentFormat = selector.value;
                this.loadIframe();
            },

            saveProgress: function() {
                const title = this.currentAnime.title.english || this.currentAnime.title.romaji;
                this.watchHistory[this.currentAnime.id] = {
                    id: this.currentAnime.id,
                    title: title,
                    image: this.currentAnime.coverImage.large,
                    episode: this.currentEpisode,
                    format: this.currentFormat,
                    fullData: this.currentAnime
                };
                localStorage.setItem('animesfan_history', JSON.stringify(this.watchHistory));
            }
        };

        // Initialize App
        app.renderHome();
    </script>
</body>
</html>
