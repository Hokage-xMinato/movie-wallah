<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>animesfan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: #151515;
            --primary-color: #e50914;
            --primary-hover: #b80710;
            --text-main: #f0f0f0;
            --text-muted: #999999;
            --transition: all 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            font-size: 14px;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            letter-spacing: 1px;
        }

        .logo span { color: var(--primary-color); }

        .nav-icons { display: flex; gap: 1.2rem; }

        .nav-icon {
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .nav-icon:hover { color: var(--primary-color); }

        /* Views */
        main {
            padding: 1.5rem 5%;
            min-height: calc(100vh - 60px);
            max-width: 1400px;
            margin: 0 auto;
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease forwards;
        }

        .view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        h2 { font-size: 1.2rem; margin-bottom: 1.2rem; color: #ddd; }

        /* Anime Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            align-items: start; /* Ensures cards don't stretch artificially if titles vary in length */
        }

        @media (min-width: 768px) {
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }

        .anime-card {
            background: var(--surface-color);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid #222;
            height: 100%; /* Fill the grid row naturally */
            display: flex;
            flex-direction: column;
        }

        .anime-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.15);
        }

        .anime-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .anime-info { 
            padding: 0.6rem; 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .anime-title {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.3;
            word-wrap: break-word; /* Allows full title to wrap naturally */
        }

        .anime-ep {
            font-size: 0.75rem;
            color: var(--primary-color);
            margin-top: 0.5rem;
        }

        /* Search Bar */
        .search-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-input {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 20px;
            border: 1px solid #333;
            background: var(--surface-color);
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
            width: 100%;
        }

        .search-input:focus { border-color: var(--primary-color); }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn:hover { background: var(--primary-hover); }

        /* Custom Dropdown UI */
        .custom-dropdown {
            position: relative;
            display: inline-block;
            min-width: 130px;
        }

        .dropdown-selected {
            background: var(--surface-color);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            border: 1px solid #333;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .dropdown-selected:hover { border-color: #555; }

        .dropdown-options {
            position: absolute;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            /* Defaults to dropping DOWN */
            top: 110%; 
            bottom: auto;
        }

        /* Dynamic class added by JS if there's no room below */
        .dropdown-options.drop-up {
            top: auto;
            bottom: 110%;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .dropdown-options.show { display: block; }

        .dropdown-option {
            padding: 0.7rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid #222;
            transition: background 0.2s;
        }

        .dropdown-option:last-child { border-bottom: none; }
        .dropdown-option:hover { background: rgba(229, 9, 20, 0.2); color: var(--primary-color); }
        .dropdown-option.active { background: var(--primary-color); color: white; }

        /* Scrollbar styling */
        .dropdown-options::-webkit-scrollbar { width: 5px; }
        .dropdown-options::-webkit-scrollbar-track { background: #111; }
        .dropdown-options::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        /* Watch View */
        .video-container {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-container iframe { width: 100%; height: 100%; border: none; }

        .video-container iframe:fullscreen,
        .video-container iframe:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
        }

        #fullscreen-btn {
            background: var(--surface-color);
            border: 1px solid #333;
        }

        #fullscreen-btn:hover { background: #222; }

        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
            background: transparent;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Details View */
        .details-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        @media (min-width: 600px) {
            .details-container { flex-direction: row; }
        }

        .details-cover {
            width: 100%;
            max-width: 220px;
            border-radius: 8px;
            object-fit: cover;
            align-self: flex-start;
        }

        .details-content p {
            color: var(--text-muted);
            line-height: 1.5;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .empty-state { text-align: center; color: #555; margin-top: 3rem; font-size: 0.9rem; }
        .loader { display: none; text-align: center; margin: 2rem 0; color: var(--primary-color); font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="app.navigate('home')">animes<span>fan</span></div>
        <div class="nav-icons">
            <span class="nav-icon" onclick="app.navigate('home')">Home</span>
            <span class="nav-icon" onclick="app.navigate('search')">Search</span>
        </div>
    </header>

    <main>
        <div id="home" class="view active">
            <h2>Continue Watching</h2>
            <div id="continue-watching-grid" class="anime-grid"></div>
            <div id="empty-home" class="empty-state" style="display: none;">
                No watch history yet. Discover something new in search!
            </div>
        </div>

        <div id="search" class="view">
            <div class="search-container">
               <input 
  type="search"
  id="search-input"
  class="search-input"
  placeholder="Search anime..."
  autocomplete="off"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
  onkeypress="if(event.key === 'Enter') app.searchAnime()">
                <button class="btn" onclick="app.searchAnime()">Search</button>
            </div>
            <div id="loader" class="loader">Fetching results...</div>
            <div id="search-results" class="anime-grid"></div>
        </div>

        <div id="details" class="view">
            <div class="details-container">
                <img id="detail-img" class="details-cover" src="" alt="Cover">
                <div class="details-content">
                    <h1 id="detail-title"></h1>
                    <p id="detail-desc"></p>
                    <p style="color: #ddd;"><strong>Episodes:</strong> <span id="detail-eps"></span></p>
                    <button class="btn" onclick="app.startWatching()">Watch Now</button>
                </div>
            </div>
        </div>

        <div id="watch" class="view">
            <h2 id="watch-title" style="text-align: center; font-size: 1.1rem;"></h2>
            
            <div class="video-container">
                <iframe id="video-player" frameBorder="0" scrolling="no" allow="fullscreen" allowFullScreen></iframe>
            </div>

            <div class="controls-bar">
                <div class="control-group">
                    <button class="btn" onclick="app.changeEpisode(-1)">Prev</button>
                    
                    <div class="custom-dropdown" id="ep-dropdown-container">
                        <div class="dropdown-selected" onclick="app.toggleDropdown('ep-options', event)">
                            <span id="selected-ep-text">Episode 1</span>
                            <span style="font-size: 0.7rem; margin-left: 8px;">▼</span>
                        </div>
                        <div class="dropdown-options" id="ep-options"></div>
                    </div>

                    <button class="btn" onclick="app.changeEpisode(1)">Next</button>
                </div>
                
                <div class="control-group">
                    <div class="custom-dropdown" style="min-width: 80px;">
                        <div class="dropdown-selected" onclick="app.toggleDropdown('format-options', event)">
                            <span id="selected-format-text" style="text-transform: capitalize;">Sub</span>
                            <span style="font-size: 0.7rem; margin-left: 8px;">▼</span>
                        </div>
                        <div class="dropdown-options" id="format-options">
                            <div class="dropdown-option" onclick="app.changeFormat('sub')">Sub</div>
                            <div class="dropdown-option" onclick="app.changeFormat('dub')">Dub</div>
                        </div>
                    </div>
                    <button class="btn" id="fullscreen-btn" onclick="app.toggleFullscreen()" title="Fullscreen">⛶ Fullscreen</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const app = {
            currentAnime: null,
            currentEpisode: 1,
            currentFormat: 'sub',
            watchHistory: JSON.parse(localStorage.getItem('animesfan_history')) || {},
            suppressUrlUpdate: false, // true while restoring state from a URL, to avoid re-pushing it

            // --- View switching (DOM only, no URL changes) ---
            switchView: function(viewId) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                if(viewId === 'home') this.renderHome();
                window.scrollTo(0, 0);
            },

            // Used directly by header/logo clicks - switches view AND updates the URL
            navigate: function(viewId) {
                this.switchView(viewId);
                if (viewId === 'home') {
                    this.updateURL({}, true);
                } else if (viewId === 'search') {
                    this.updateURL({ view: 'search' }, true);
                }
            },

            // --- URL / query param routing ---
            // Writes the current app state into the URL so it can be shared and survives back/forward.
            updateURL: function(params, push) {
                if (this.suppressUrlUpdate) return;
                const qs = new URLSearchParams();
                Object.keys(params).forEach(key => {
                    const val = params[key];
                    if (val !== undefined && val !== null && val !== '') qs.set(key, val);
                });
                const queryString = qs.toString();
                const newUrl = queryString ? `${location.pathname}?${queryString}` : location.pathname;
                if (push) {
                    history.pushState({ params }, '', newUrl);
                } else {
                    history.replaceState({ params }, '', newUrl);
                }
            },

            // Reads the URL and rebuilds whatever state/view it describes.
            // Called on first load and whenever the user navigates back/forward.
            loadFromURL: async function() {
                this.suppressUrlUpdate = true;
                const params = new URLSearchParams(location.search);
                const view = params.get('view') || 'home';
                const id = params.get('id');
                const ep = parseInt(params.get('ep')) || 1;
                const format = params.get('format') || 'sub';
                const q = params.get('q') || '';

                try {
                    if (view === 'search') {
                        this.switchView('search');
                        document.getElementById('search-input').value = q;
                        if (q) await this.searchAnime(false);
                    } else if (view === 'details' && id) {
                        const anime = await this.getAnimeData(id);
                        if (anime) {
                            this.showDetailsData(anime);
                            this.switchView('details');
                        } else {
                            this.switchView('home');
                        }
                    } else if (view === 'watch' && id) {
                        const anime = await this.getAnimeData(id);
                        if (anime) {
                            this.currentAnime = anime;
                            this.currentEpisode = ep;
                            this.currentFormat = format;
                            this.setupWatchEnvironment();
                            this.switchView('watch');
                        } else {
                            this.switchView('home');
                        }
                    } else {
                        this.switchView('home');
                    }
                } finally {
                    this.suppressUrlUpdate = false;
                }
            },

            // Gets full anime data for an id - from local watch history if we have it, otherwise from AniList.
            getAnimeData: async function(id) {
                if (this.watchHistory[id]) return this.watchHistory[id].fullData;
                return await this.fetchAnimeById(id);
            },

            fetchAnimeById: async function(id) {
                const graphqlQuery = `
                query ($id: Int) {
                    Media(id: $id, type: ANIME) {
                        id
                        title { romaji english }
                        coverImage { large }
                        description(asHtml: false)
                        episodes
                    }
                }`;
                try {
                    const response = await fetch('https://graphql.anilist.co', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ query: graphqlQuery, variables: { id: parseInt(id) } })
                    });
                    const data = await response.json();
                    return data.data.Media;
                } catch (error) {
                    return null;
                }
            },

            // Home Render
            renderHome: function() {
                const grid = document.getElementById('continue-watching-grid');
                const empty = document.getElementById('empty-home');
                grid.innerHTML = '';
                
                const historyIds = Object.keys(this.watchHistory);
                if (historyIds.length === 0) {
                    empty.style.display = 'block';
                    return;
                }
                
                empty.style.display = 'none';
                
                historyIds.reverse().forEach(id => {
                    const anime = this.watchHistory[id];
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.onclick = () => this.resumeAnime(anime);
                    card.innerHTML = `
                        <img src="${anime.image}" alt="${anime.title}">
                        <div class="anime-info">
                            <div class="anime-title">${anime.title}</div>
                            <div class="anime-ep">Ep ${anime.episode} | ${anime.format.toUpperCase()}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            // Search AniList API
            searchAnime: async function(pushUrl = true) {
                const query = document.getElementById('search-input').value;
                if(!query) return;

                const loader = document.getElementById('loader');
                const grid = document.getElementById('search-results');
                
                grid.innerHTML = '';
                loader.style.display = 'block';

                const graphqlQuery = `
                query ($search: String) {
                    Page(page: 1, perPage: 24) {
                        media(search: $search, type: ANIME, sort: POPULARITY_DESC) {
                            id
                            title { romaji english }
                            coverImage { large }
                            description(asHtml: false)
                            episodes
                        }
                    }
                }`;

                try {
                    const response = await fetch('https://graphql.anilist.co', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ query: graphqlQuery, variables: { search: query } })
                    });
                    
                    const data = await response.json();
                    loader.style.display = 'none';
                    this.renderSearchResults(data.data.Page.media);
                    if (pushUrl) this.updateURL({ view: 'search', q: query }, true);
                } catch (error) {
                    loader.style.display = 'none';
                    grid.innerHTML = '<p class="empty-state">Failed to load. Check your connection.</p>';
                }
            },

            renderSearchResults: function(results) {
                const grid = document.getElementById('search-results');
                results.forEach(anime => {
                    const title = anime.title.english || anime.title.romaji;
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.onclick = () => this.showDetails(anime);
                    card.innerHTML = `
                        <img loading="lazy" src="${anime.coverImage.large}" alt="${title}">
                        <div class="anime-info">
                            <div class="anime-title">${title}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            // Details View
            showDetails: function(anime) {
                this.showDetailsData(anime);
                this.switchView('details');
                this.updateURL({ view: 'details', id: anime.id }, true);
            },

            showDetailsData: function(anime) {
                this.currentAnime = anime;
                const title = anime.title.english || anime.title.romaji;
                
                document.getElementById('detail-img').src = anime.coverImage.large;
                document.getElementById('detail-title').innerText = title;
                
                let desc = anime.description ? anime.description.replace(/<[^>]*>?/gm, '') : 'No description available.';
                document.getElementById('detail-desc').innerText = desc;
                document.getElementById('detail-eps').innerText = anime.episodes || 'Ongoing';
            },

            // Watch Logic
            startWatching: function() {
                const history = this.watchHistory[this.currentAnime.id];
                this.currentEpisode = history ? history.episode : 1;
                this.currentFormat = history ? history.format : 'sub';
                
                this.setupWatchEnvironment();
                this.switchView('watch');
                this.updateURL({ view: 'watch', id: this.currentAnime.id, ep: this.currentEpisode, format: this.currentFormat }, true);
            },

            resumeAnime: function(historyData) {
                this.currentAnime = historyData.fullData;
                this.currentEpisode = historyData.episode;
                this.currentFormat = historyData.format;
                
                this.setupWatchEnvironment();
                this.switchView('watch');
                this.updateURL({ view: 'watch', id: this.currentAnime.id, ep: this.currentEpisode, format: this.currentFormat }, true);
            },

            setupWatchEnvironment: function() {
                const title = this.currentAnime.title.english || this.currentAnime.title.romaji;
                document.getElementById('watch-title').innerText = `${title} - Episode ${this.currentEpisode}`;
                document.getElementById('selected-format-text').innerText = this.currentFormat;
                document.getElementById('selected-ep-text').innerText = `Episode ${this.currentEpisode}`;
                
                // Build Custom Episode Dropdown
                const epOptionsContainer = document.getElementById('ep-options');
                epOptionsContainer.innerHTML = '';
                const totalEps = this.currentAnime.episodes || 1000; 
                
                for(let i = 1; i <= totalEps; i++) {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = `dropdown-option ${i === this.currentEpisode ? 'active' : ''}`;
                    optionDiv.innerText = `Episode ${i}`;
                    optionDiv.onclick = (e) => {
                        e.stopPropagation();
                        this.jumpEpisode(i);
                        this.closeAllDropdowns();
                    };
                    epOptionsContainer.appendChild(optionDiv);
                    
                    if (!this.currentAnime.episodes && i > this.currentEpisode + 30) break;
                }

                this.loadIframe();
            },

            loadIframe: function() {
                const iframe = document.getElementById('video-player');
                const url = `https://vidnest.fun/animepahe/${this.currentAnime.id}/${this.currentEpisode}/${this.currentFormat}?pip=hide`;
                iframe.src = url;
                
                document.getElementById('selected-ep-text').innerText = `Episode ${this.currentEpisode}`;
                
                // Update active state in custom dropdown
                document.querySelectorAll('#ep-options .dropdown-option').forEach(el => {
                    el.classList.remove('active');
                    if(el.innerText === `Episode ${this.currentEpisode}`) el.classList.add('active');
                });

                this.saveProgress();
            },

            changeEpisode: function(step) {
                const newEp = this.currentEpisode + step;
                if(newEp > 0 && (newEp <= (this.currentAnime.episodes || Infinity))) {
                    this.currentEpisode = newEp;
                    this.setupWatchEnvironment(); 
                    this.updateURL({ view: 'watch', id: this.currentAnime.id, ep: this.currentEpisode, format: this.currentFormat }, false);
                }
            },

            jumpEpisode: function(epNum) {
                this.currentEpisode = parseInt(epNum);
                this.loadIframe();
                this.updateURL({ view: 'watch', id: this.currentAnime.id, ep: this.currentEpisode, format: this.currentFormat }, false);
            },

            changeFormat: function(format) {
                this.currentFormat = format;
                document.getElementById('selected-format-text').innerText = format;
                this.closeAllDropdowns();
                this.loadIframe();
                this.updateURL({ view: 'watch', id: this.currentAnime.id, ep: this.currentEpisode, format: this.currentFormat }, false);
            },

            // Fullscreen Logic - expands the video iframe itself to fill the screen
            toggleFullscreen: function() {
                const iframe = document.getElementById('video-player');
                const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;

                if (!isFullscreen) {
                    if (iframe.requestFullscreen) iframe.requestFullscreen();
                    else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
                    else if (iframe.webkitEnterFullscreen) iframe.webkitEnterFullscreen(); // iOS Safari fallback
                    else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                    else if (document.msExitFullscreen) document.msExitFullscreen();
                }
            },

            // Fires whenever fullscreen state changes (any vendor-prefixed event) - keeps
            // orientation lock in sync regardless of which fullscreen API path was used.
            handleFullscreenChange: function() {
                const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
                if (isFullscreen) {
                    if (screen.orientation && screen.orientation.lock) {
                        // Best effort: not supported on iOS Safari, fails silently there.
                        screen.orientation.lock('landscape').catch(() => {});
                    }
                } else {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                }
            },

            saveProgress: function() {
                const title = this.currentAnime.title.english || this.currentAnime.title.romaji;
                this.watchHistory[this.currentAnime.id] = {
                    id: this.currentAnime.id,
                    title: title,
                    image: this.currentAnime.coverImage.large,
                    episode: this.currentEpisode,
                    format: this.currentFormat,
                    fullData: this.currentAnime
                };
                localStorage.setItem('animesfan_history', JSON.stringify(this.watchHistory));
            },

            // Smart Toggle Logic for Dropdowns
            toggleDropdown: function(id, event) {
                event.stopPropagation();
                const dropdown = document.getElementById(id);
                const isShowing = dropdown.classList.contains('show');
                this.closeAllDropdowns();
                
                if(!isShowing) {
                    // Check available space dynamically
                    const triggerRect = event.currentTarget.getBoundingClientRect();
                    const spaceBelow = window.innerHeight - triggerRect.bottom;
                    const requiredSpace = 260; // Approximate max height of dropdown window
                    
                    // If space below is too small, apply the drop-up class
                    if (spaceBelow < requiredSpace) {
                        dropdown.classList.add('drop-up');
                    } else {
                        dropdown.classList.remove('drop-up');
                    }

                    dropdown.classList.add('show');
                    
                    // Scroll active item into view
                    const activeItem = dropdown.querySelector('.active');
                    if (activeItem) {
                        dropdown.scrollTop = activeItem.offsetTop - dropdown.offsetTop - (dropdown.clientHeight / 2);
                    }
                }
            },

            closeAllDropdowns: function() {
                document.querySelectorAll('.dropdown-options').forEach(el => el.classList.remove('show'));
            }
        };

        // Close dropdowns when clicking anywhere outside
        document.addEventListener('click', () => app.closeAllDropdowns());

        // Keep landscape lock in sync with fullscreen state across browser vendors
        ['fullscreenchange', 'webkitfullscreenchange', 'msfullscreenchange'].forEach(evt => {
            document.addEventListener(evt, () => app.handleFullscreenChange());
        });

        // Handle browser back/forward
        window.addEventListener('popstate', () => app.loadFromURL());

        // Initialize - restores whatever view/anime/episode the URL points to
        app.loadFromURL();
    </script>
</body>
</html>
